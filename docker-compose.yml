# FAMA — production-style local run.
#
# In el VPS: la red dokploy-network ya existe (overlay swarm). Localmente,
# tras la primera vez: `docker network create dokploy-network` (o usá una red
# bridge alternativa si no querés overlay en local).
#
# Auth de Studio: NO vive en este compose. Vive en Traefik del VPS via
# /etc/dokploy/traefik/dynamic/fama.yml (file-based dynamic config). Issue
# #484 de Dockploy hace inseguro labels-based middleware en compose.

services:
  fama:
    build: .
    container_name: fama
    restart: unless-stopped
    init: true
    # Give graceful shutdown enough time to drain background tasks (10s) +
    # flush Langfuse spans (~5s typical) before Docker sends SIGKILL.
    stop_grace_period: 30s
    networks:
      - dokploy-network
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # Persist memory inside the named volume so it survives restarts.
      MASTRA_DB_URL: file:/app/data/mastra.db
    volumes:
      - fama-state:/app/data
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -q -O /dev/null http://localhost:4111/health || exit 1"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

networks:
  # Overlay swarm de Traefik en el VPS (Dockploy). Externamente creada.
  dokploy-network:
    external: true

volumes:
  fama-state:
